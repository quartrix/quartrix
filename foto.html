      height: 100px;
      background: #ffd2a6;
      bottom: 20%;

      animation-delay: 2s;

    .bg-decoration:nth-child(4) {
      width: 80px;
      height: 80px;
      background: #ff8c42;
      top: 30%;
      right: 25%;
      animation-delay: 3s;

      50% {

    @keyframes slideIn {

    .hamburger {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: 6px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 245, 230, 0.1);
      transition:
        background 0.3s ease,
        box-shadow 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .hamburger:hover {
      background: rgba(255, 245, 230, 0.2);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }

    .hamburger span {
      width: 30px;
      height: 4px;
      background: #fff5e6;
      border-radius: 2px;
      transition: all 0.3s ease;
      position: relative;
    }

    .hamburger span::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: inherit;
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .hamburger:hover span::before {
      transform: scaleX(1);
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(-45deg) translate(-7px, 7px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(45deg) translate(-7px, -7px);
    }

    main {

      padding: 3rem 2rem;
      width: 100%;
    }

    section#foto {

    }

    section#foto h2 {
      color: #ffd2a6;
      margin-bottom: 2rem;
      text-align: center;
      animation: fadeInDown 1s ease forwards;
    }

    /* GRID FOTO */
    .foto-grid {
      display: grid;
      grid-template-columns: 1fr;
      /* 1 foto per baris di semua perangkat */
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      /* center */
      animation: fadeInUp 1s ease forwards;
    }

    .foto-card {
      background: #fff5e6;
      /* krem */
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: 0.3s ease;
      text-align: center;
    }

    /* SOCIAL MEDIA DI MENU */
    .social-menu {
      margin-top: 2rem;
      padding-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      border-top: 1px solid rgba(255, 245, 230, 0.4);
    }

    .social-menu a {
      width: 44px;
      height: 44px;
      background: rgba(255, 245, 230, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s ease;
    }

    .social-menu a:hover {
      background: #fff5e6;
      transform: scale(1.15);
    }

    .social-menu img {
      width: 22px;
      height: 22px;
      filter: invert(95%);
      /* putih */
    }

    .social-menu a:hover img {
      filter: invert(30%) sepia(80%) saturate(500%) hue-rotate(10deg);
    }

    /* HILANGKAN SIMBOL DI SAMPING LOGO SOSIAL MEDIA */
    .social-menu a::before {
      display: none !important;
      content: none !important;
    }

    .foto-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(255, 140, 66, 0.6);
    }

    .foto-card img {
      width: 100%;
      height: 90vh;
      /* Tinggi hampir 1 halaman (90% viewport height) untuk gambar besar */
      object-fit: contain;
      /* Menjaga aspek rasio tanpa crop */
      border-radius: 12px;
    }

    .foto-card p {
      color: #5c4435;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* FOOTER */

      background: #3e2c23;
      /* coklat gelap */
      text-align: center;
      padding: 1.5rem 2rem;
      color: #fff5e6;
      font-size: 0.9rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Animations */
    @keyframes fadeInDown {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */

      header h1 {
        font-size: 1.4rem;
      }

      nav a {
        font-size: 1rem;
      }

      /* Grid tetap 1 kolom, tidak diubah */
    }
